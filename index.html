<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temp Note</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:,">
  <style>
    :root {
      --bg: #f5f4f0;
      --bg2: #eeecea;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --text: #1a1814;
      --text-muted: #7a7670;
      --text-faint: #b5b0aa;
      --accent: #1a1814;
      --accent-fg: #f5f4f0;
      --danger: #c0392b;
      --danger-bg: #fdf0ee;
      --danger-hover: #e74c3c;
      --btn-hover: rgba(0,0,0,0.06);
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 8px 32px rgba(0,0,0,0.04);
      --modal-bg: rgba(245,244,240,0.8);
      --header-bg: rgba(245,244,240,0.85);
      --scrollbar: rgba(0,0,0,0.12);
      --scrollbar-hover: rgba(0,0,0,0.22);
      --badge-bg: rgba(0,0,0,0.05);
    }

    .dark {
      --bg: #111110;
      --bg2: #161614;
      --surface: #1c1c1a;
      --border: rgba(255,255,255,0.07);
      --text: #f0ede8;
      --text-muted: #8a8680;
      --text-faint: #4a4742;
      --accent: #f0ede8;
      --accent-fg: #111110;
      --danger: #e05c4a;
      --danger-bg: rgba(224,92,74,0.12);
      --danger-hover: #e87060;
      --btn-hover: rgba(255,255,255,0.07);
      --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 8px 32px rgba(0,0,0,0.3);
      --modal-bg: rgba(17,17,16,0.85);
      --header-bg: rgba(17,17,16,0.8);
      --scrollbar: rgba(255,255,255,0.1);
      --scrollbar-hover: rgba(255,255,255,0.2);
      --badge-bg: rgba(255,255,255,0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      transition: background 0.25s, color 0.25s;
      overflow: hidden;
    }

    ::selection { background: var(--accent); color: var(--accent-fg); }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      z-index: 10;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      user-select: none;
    }

    .brand-icon {
      width: 26px;
      height: 26px;
      background: var(--accent);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-icon svg {
      width: 13px;
      height: 13px;
      color: var(--accent-fg);
    }

    .brand-name {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .word-count {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-faint);
      background: var(--badge-bg);
      padding: 2px 7px;
      border-radius: 20px;
      letter-spacing: 0.02em;
      transition: opacity 0.2s;
      font-family: 'Geist Mono', monospace;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .divider {
      width: 1px;
      height: 18px;
      background: var(--border);
      margin: 0 4px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 34px;
      padding: 0 10px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    .btn:hover {
      background: var(--btn-hover);
      color: var(--text);
    }

    .btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .btn-icon {
      width: 34px;
      padding: 0;
    }

    .btn-danger {
      color: var(--danger);
    }

    .btn-danger:hover {
      background: var(--danger-bg);
      color: var(--danger-hover);
    }

    .btn-primary {
      background: var(--accent);
      color: var(--accent-fg);
      padding: 0 14px;
    }

    .btn-primary:hover {
      opacity: 0.88;
      background: var(--accent);
      color: var(--accent-fg);
    }

    /* ── Copy feedback ── */
    .btn.copied {
      color: #4caf82;
    }

    /* ── Textarea ── */
    .note-area {
      flex: 1;
      width: 100%;
      padding: 40px 52px;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: var(--text);
      font-family: 'Geist Mono', monospace;
      font-size: 15px;
      font-weight: 300;
      line-height: 1.8;
      caret-color: var(--accent);
      overflow-y: auto;
    }

    .note-area::placeholder {
      color: var(--text-faint);
    }

    /* Scrollbar */
    .note-area::-webkit-scrollbar { width: 5px; }
    .note-area::-webkit-scrollbar-track { background: transparent; }
    .note-area::-webkit-scrollbar-thumb {
      background: var(--scrollbar);
      border-radius: 10px;
    }
    .note-area::-webkit-scrollbar-thumb:hover {
      background: var(--scrollbar-hover);
    }

    /* Responsive padding */
    @media (max-width: 640px) {
      .note-area { padding: 28px 24px; }
      .btn-label { display: none; }
      .word-count { display: none; }
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      background: var(--modal-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.15s ease;
    }

    .modal-overlay.open {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 28px;
      width: 100%;
      max-width: 360px;
      animation: slideUp 0.2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .modal-icon {
      width: 40px;
      height: 40px;
      background: var(--danger-bg);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      color: var(--danger);
    }

    .modal-icon svg { width: 18px; height: 18px; }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .modal-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .modal-actions .btn {
      height: 38px;
      padding: 0 18px;
      font-size: 13px;
    }

    .modal-actions .btn-cancel {
      background: var(--btn-hover);
      color: var(--text-muted);
    }

    .modal-actions .btn-cancel:hover {
      background: var(--border);
      color: var(--text);
    }

    .modal-actions .btn-delete {
      background: var(--danger);
      color: #fff;
    }

    .modal-actions .btn-delete:hover {
      background: var(--danger-hover);
      color: #fff;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M3 4h10M3 8h7M3 12h5"/>
        </svg>
      </div>
      <span class="brand-name">Temp Note</span>
      <span class="word-count" id="wordCount">0 words</span>
    </div>

    <div class="toolbar">
      <!-- Theme toggle -->
      <button class="btn btn-icon" id="themeToggle" title="Toggle theme">
        <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" style="display:none">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>

      <div class="divider"></div>

      <!-- Select All -->
      <button class="btn btn-icon" id="selectAll" title="Select all">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M7 8h10M7 12h7M7 16h5"/>
        </svg>
      </button>

      <!-- Copy All -->
      <button class="btn btn-icon" id="copyAll" title="Copy all">
        <svg id="copyIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <svg id="checkIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none; color: #4caf82">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>

      <!-- Clear -->
      <button class="btn btn-icon btn-danger" id="clearAll" title="Clear all">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
      </button>

      <div class="divider"></div>

      <!-- Export -->
      <button class="btn btn-primary" id="exportTxt" title="Export as .txt">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span class="btn-label">Export</span>
      </button>
    </div>
  </header>

  <!-- Note Area -->
  <textarea
    class="note-area"
    id="note"
    placeholder="Start writing…"
    spellcheck="false"
    autofocus
  ></textarea>

</div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
      </svg>
    </div>
    <div class="modal-title">Clear all notes?</div>
    <p class="modal-desc">This will permanently delete everything you've typed. This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-cancel" id="modalCancel">Cancel</button>
      <button class="btn btn-delete" id="modalConfirm">Clear all</button>
    </div>
  </div>
</div>

<script>
  const noteEl       = document.getElementById('note');
  const wordCountEl  = document.getElementById('wordCount');
  const themeBtn     = document.getElementById('themeToggle');
  const iconSun      = document.getElementById('iconSun');
  const iconMoon     = document.getElementById('iconMoon');
  const selectBtn    = document.getElementById('selectAll');
  const copyBtn      = document.getElementById('copyAll');
  const copyIcon     = document.getElementById('copyIcon');
  const checkIcon    = document.getElementById('checkIcon');
  const clearBtn     = document.getElementById('clearAll');
  const exportBtn    = document.getElementById('exportTxt');
  const modal        = document.getElementById('confirmModal');
  const modalCancel  = document.getElementById('modalCancel');
  const modalConfirm = document.getElementById('modalConfirm');
  const htmlEl       = document.documentElement;

  // ── Theme ──
  function setTheme(theme) {
    if (theme === 'dark') {
      htmlEl.classList.add('dark');
      iconSun.style.display = 'none';
      iconMoon.style.display = 'block';
    } else {
      htmlEl.classList.remove('dark');
      iconSun.style.display = 'block';
      iconMoon.style.display = 'none';
    }
    localStorage.setItem('theme', theme);
  }

  function loadTheme() {
    const saved = localStorage.getItem('theme');
    const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    setTheme(saved || (sysDark ? 'dark' : 'light'));
  }

  themeBtn.addEventListener('click', () => {
    setTheme(htmlEl.classList.contains('dark') ? 'light' : 'dark');
  });

  // ── Word count ──
  function updateWordCount() {
    const text = noteEl.value.trim();
    const words = text ? text.split(/\s+/).length : 0;
    const chars = noteEl.value.length;
    wordCountEl.textContent = words === 1 ? '1 word' : `${words} words`;
  }

  noteEl.addEventListener('input', updateWordCount);

  // ── Select All ──
  selectBtn.addEventListener('click', () => {
    noteEl.focus();
    noteEl.select();
  });

  // ── Copy All ──
  let copyTimeout;
  copyBtn.addEventListener('click', async () => {
    if (!noteEl.value) return;
    try {
      await navigator.clipboard.writeText(noteEl.value);
    } catch {
      noteEl.focus();
      noteEl.select();
      document.execCommand('copy');
    }
    // Show checkmark
    copyIcon.style.display = 'none';
    checkIcon.style.display = 'block';
    clearTimeout(copyTimeout);
    copyTimeout = setTimeout(() => {
      copyIcon.style.display = 'block';
      checkIcon.style.display = 'none';
    }, 1800);
  });

  // ── Clear ──
  clearBtn.addEventListener('click', () => modal.classList.add('open'));
  modalCancel.addEventListener('click', () => modal.classList.remove('open'));
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('open'); });
  modalConfirm.addEventListener('click', () => {
    noteEl.value = '';
    updateWordCount();
    modal.classList.remove('open');
  });

  // ── Export ──
  exportBtn.addEventListener('click', () => {
    const blob = new Blob([noteEl.value], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'temp-note.txt';
    a.click();
    URL.revokeObjectURL(a.href);
  });

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.classList.contains('open')) {
      modal.classList.remove('open');
    }
  });

  // ── Init ──
  loadTheme();
  updateWordCount();
  noteEl.focus();
</script>
</body>
</html>
